# Load-balances the API across the maestro-server replicas.
# Any node can serve any request; it transparently routes flow-engine operations to the
# node that owns the relevant flow group, so simple round-robin is fine.
upstream maestro_backend {
    least_conn;
    server maestro-1:8080 max_fails=3 fail_timeout=15s;
    server maestro-2:8080 max_fails=3 fail_timeout=15s;
    server maestro-3:8080 max_fails=3 fail_timeout=15s;
}

server {
    listen 80;
    server_name _;

    # Health of the LB itself.
    location = /healthz {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Proxies the REST API (/api/v3/...) and the read-only operator UI (/ui, /css/...)
    # to the backend. The UI is unauthenticated like the API — enforce auth here at the LB.
    location / {
        proxy_pass http://maestro_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;

        # Retry the next node if one is down / returns a gateway error.
        proxy_next_upstream error timeout http_502 http_503 http_504;
    }
}
