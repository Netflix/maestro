# Multi-instance maestro-server on a single EC2 host, behind an nginx load balancer.
# All three app nodes share your EXTERNAL Postgres (set via deploy/maestro.env).
#
#   cd deploy && cp maestro.env.example maestro.env   # then edit DB settings
#   docker compose up -d --build
#   curl http://localhost/api/v3/workflows/...        # via nginx on :80
#
# Scale by editing the node list + nginx upstream (and MAESTRO_MAX_GROUP_NUM = 3 * nodes).

x-maestro-common: &maestro-common
  build:
    context: ..
    dockerfile: Dockerfile
  image: maestro-server:local
  restart: unless-stopped
  env_file: ./maestro.env
  environment:
    SPRING_PROFILES_ACTIVE: prod
    SPRING_CONFIG_ADDITIONAL_LOCATION: file:/config/
    JAVA_OPTS: "-XX:MaxRAMPercentage=70 -XX:+UseG1GC"
  volumes:
    - ./application-prod.yml:/config/application-prod.yml:ro
  expose:
    - "8080"          # internal only; reachable by siblings and nginx on the compose network
  networks:
    - maestro

services:
  # MAESTRO_NODE_ADDRESS must be each node's own service DNS name so peers can route flow
  # operations to the group owner. It must match the service key.
  maestro-1:
    <<: *maestro-common
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_CONFIG_ADDITIONAL_LOCATION: file:/config/
      JAVA_OPTS: "-XX:MaxRAMPercentage=70 -XX:+UseG1GC"
      MAESTRO_NODE_ADDRESS: http://maestro-1:8080
  maestro-2:
    <<: *maestro-common
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_CONFIG_ADDITIONAL_LOCATION: file:/config/
      JAVA_OPTS: "-XX:MaxRAMPercentage=70 -XX:+UseG1GC"
      MAESTRO_NODE_ADDRESS: http://maestro-2:8080
  maestro-3:
    <<: *maestro-common
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_CONFIG_ADDITIONAL_LOCATION: file:/config/
      JAVA_OPTS: "-XX:MaxRAMPercentage=70 -XX:+UseG1GC"
      MAESTRO_NODE_ADDRESS: http://maestro-3:8080

  lb:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - maestro-1
      - maestro-2
      - maestro-3
    ports:
      - "8090:8090"        # expose the cluster to the host / your ALB
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - maestro

networks:
  maestro:
    driver: bridge
